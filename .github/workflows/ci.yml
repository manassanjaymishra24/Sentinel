name: CI (Lint, Test, Security)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install ruff mypy

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run mypy type checking
        run: mypy sentinel/ --strict

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    env:
      ANTHROPIC_API_KEY: "test-key-sentinel"
      OPENAI_API_KEY: "test-key-sentinel"
      SENTINEL_ENV: "test"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: >
          pytest tests/ -v --tb=short
          --cov=sentinel --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: Python-${{ matrix.python-version }}
          fail_ci_if_error: false

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install security tools
        run: pip install pip-audit bandit safety

      - name: Run pip-audit for dependency vulnerabilities
        run: pip-audit --desc

      - name: Run bandit for code security issues
        run: bandit -r sentinel/ -ll -f json -o bandit-report.json || true  # ← fixed

      - name: Check bandit results
        run: |
          if grep -q '"severity": "HIGH"' bandit-report.json || grep -q '"severity": "MEDIUM"' bandit-report.json; then
            echo "Security issues found!"
            cat bandit-report.json
            exit 1
          fi

      - name: Run safety check
        run: safety check --json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  type-coverage:
    name: Type Coverage Report
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install mypy
        run: pip install mypy

      - name: Run mypy with report
        run: mypy sentinel/ --strict --txt-report mypy-report --html-report mypy-html || true

      - name: Check type coverage threshold
        run: |
          total=$(find sentinel -name "*.py" -type f | wc -l)
          echo "Total Python files in sentinel: $total"
          if [ "$total" -lt 5 ]; then
            echo "Not enough sentinel files - check directory structure"
            exit 1
          fi

      - name: Upload type coverage report
        uses: actions/upload-artifact@v4
        with:
          name: type-coverage
          path: mypy-report/