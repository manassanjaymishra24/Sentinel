name: Release (Build & Publish)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  validate-version:
    name: Validate Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@f677139edd7d925edc7592245015c4d73da5ecf9
        with:
          python-version: "3.10"

      - name: Validate version matches pyproject.toml
        run: |
          VERSION_TAG="${{ steps.version.outputs.version }}"
          PYPROJECT_VERSION=$(python -c "import tomllib; data = tomllib.load(open('pyproject.toml', 'rb')); print(data['project']['version'])")
          echo "Tag version: $VERSION_TAG"
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          if [ "$VERSION_TAG" != "$PYPROJECT_VERSION" ]; then
            echo "ERROR: Version mismatch between tag and pyproject.toml"
            exit 1
          fi

      - name: Validate CHANGELOG.md has entry
        run: |
          VERSION_TAG="${{ steps.version.outputs.version }}"
          if ! grep -q "\[$VERSION_TAG\]" CHANGELOG.md; then
            echo "ERROR: No CHANGELOG entry for version $VERSION_TAG"
            exit 1
          fi

  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: validate-version
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      ANTHROPIC_API_KEY: "test-key-sentinel"
      OPENAI_API_KEY: "test-key-sentinel"
      SENTINEL_ENV: "test"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@f677139edd7d925edc7592245015c4d73da5ecf9
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full test suite
        run: >
          pytest tests/ -v --tb=short
          --cov=sentinel --cov-report=term-missing --cov-report=xml

      - name: Check coverage >= 80%
        run: |
          coverage report --fail-under=80

      - name: Run demo
        run: python demo_new_features.py || exit_code=$?; test $exit_code -eq 0 -o $exit_code -eq 1

      - name: Upload coverage for merge
        uses: actions/upload-artifact@6ca3e1589f5700e67145017b4c6bcb8e0303ae3e
        if: matrix.python-version == '3.10'
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: full-test-suite
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@f677139edd7d925edc7592245015c4d73da5ecf9
        with:
          python-version: "3.10"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Verify distribution files
        run: |
          ls -lh dist/
          tar -tzf dist/sentinel-agent-*.tar.gz | head -20

      - name: Test wheel installation
        run: |
          python -m venv test-venv-release
          source test-venv-release/bin/activate || . test-venv-release/Scripts/activate
          pip install dist/sentinel_agent-*.whl
          python -c "import sentinel; print(f'Sentinel installed successfully')"

      - name: Upload distributions
        uses: actions/upload-artifact@6ca3e1589f5700e67145017b4c6bcb8e0303ae3e
        with:
          name: distributions
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://pypi.org/project/sentinel-agent/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download distributions
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ec4da930e2794f23c593285f520210e56b21485a
        with:
          print-hash: true

      - name: Create GitHub Release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4d007f91fb3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            Automated release for Sentinel Security Agent
            
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
          draft: false
          prerelease: false
